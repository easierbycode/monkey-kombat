<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monkey Kombat Character Select</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    html,
    body {
      height: 100%;
    }

    body {
      background: url('menu-bg.png') center center / cover no-repeat #2a2a2a;
      color: #fff;
      font-family: 'Orbitron', monospace;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    h1 {
      text-align: center;
      font-size: 3.5em;
      margin: 20px 0;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;

      /* MK Gradient Style */
      background: linear-gradient(180deg, #fff 0%, #ffcc00 20%, #ff6600 50%, #cc0000 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;

      /* Outline/Stroke simulation */
      filter: drop-shadow(2px 2px 0px #000) drop-shadow(-1px -1px 0 #000);
      position: relative;
    }

    .select-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scrollbar-width: none; /* Firefox */
    }

    .select-container::-webkit-scrollbar {
      display: none; /* Chrome/Safari */
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      max-width: 720px;
      margin: 0 auto;
      padding: 5px;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(130,140,110,0.4), transparent 50%),
        radial-gradient(ellipse at 75% 85%, rgba(100,115,90,0.3), transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(110,125,100,0.3), transparent 60%),
        linear-gradient(160deg, #5e6e55, #4a5a42, #3d4d36, #526249);
      border: 4px solid #222;
      border-radius: 0;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
    }

    .character-tile {
      position: relative;
      aspect-ratio: 4/3;
      background: #1a1a1a;
      border: 3px solid #333;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-decoration: none;
      border-radius: 0;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6);
      color: inherit;
    }

    .character-tile:hover,
    .character-tile.selected {
      transform: scale(1.05);
      z-index: 10;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      border-color: #888;
    }

    .character-tile.selected {
      animation: borderFlash 0.1s infinite;
      border-width: 3px;
      border-style: solid;
    }

    @keyframes borderFlash {
      0% {
        border-color: #00ff00;
      }

      50% {
        border-color: #ffff00;
      }

      100% {
        border-color: #00ff00;
      }
    }

    .random-tile {
      background:
        radial-gradient(circle, rgba(60,70,55,0.8), rgba(30,35,28,0.9)),
        linear-gradient(135deg, #3a4a35, #2a3a25);
      border-color: #444;
    }

    .random-tile img {
      image-rendering: pixelated;
      max-width: 75% !important;
      max-height: 75% !important;
      filter: brightness(1.5) contrast(1.3) drop-shadow(0 0 8px rgba(255,215,0,0.4)) !important;
    }

    .random-tile .random-frame {
      position: absolute;
      animation: random-select-anim 0.4s steps(1) infinite;
    }

    .random-tile .random-frame:nth-child(2) {
      animation-delay: 0.2s;
    }

    .random-tile .random-frame:nth-child(1) {
      animation: random-select-frame0 0.4s steps(1) infinite;
    }

    .random-tile .random-frame:nth-child(2) {
      animation: random-select-frame1 0.4s steps(1) infinite;
    }

    @keyframes random-select-frame0 {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes random-select-frame1 {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .random-tile:hover {
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    .random-tile:hover img {
      filter: brightness(2) contrast(1.4) drop-shadow(0 0 12px rgba(255,215,0,0.7)) !important;
    }

    .character-tile img {
      max-width: 75%;
      max-height: 75%;
      object-fit: contain;
      filter: brightness(1.1) contrast(1.2);
      transition: filter 0.2s ease;
      pointer-events: none;
    }

    .character-tile:hover img,
    .character-tile.selected img {
      filter: brightness(1.3) contrast(1.4) saturate(1.2);
    }

    .character-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
      color: #ffd700;
      text-align: center;
      padding: 8px 2px;
      font-size: 0.75em;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 3px #000;
      transition: all 0.2s ease;
    }

    .choose {
      color: #ffd700;
      text-align: center;
      font-size: 1.2em;
      margin: 10px 0 20px 0;
      text-shadow: 0 0 10px #ffd700;
      animation: pulse 2s infinite;
      font-weight: 700;
      letter-spacing: 2px;
    }



    body.inLauncher .instructions {
      display: none;
    }

    @keyframes pulse {
      0% {
        opacity: 0.7;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.05);
      }

      100% {
        opacity: 0.7;
        transform: scale(1);
      }
    }

    .select-container::before,
    .select-container::after {
      display: none;
    }

    @media (orientation: landscape) and (max-height: 600px) {
      .character-grid {
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        padding: 4px;
        max-width: 98%;
      }

      .select-container {
        height: 100vh;
      }

      .character-tile {
        aspect-ratio: 4/3;
      }

      .character-name {
        font-size: 0.6em;
        padding: 3px 2px;
      }
    }

    @media (max-width: 768px) {
      .character-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        padding: 4px;
        max-width: 95%;
      }
    }

    body.game-active {
      background: #111;
      background-image: none;
      cursor: none;
      image-rendering: pixelated;
      overflow: hidden;
    }

    body.game-active .select-container,
    body.game-active .instructions {
      display: none;
    }

    /* MK2-style random select */
    @keyframes mk2-flash-border {
      0%   { box-shadow: 0 0 0 4px #ff0, 0 0 15px 4px #ff0; }
      25%  { box-shadow: 0 0 0 4px #f00, 0 0 15px 4px #f00; }
      50%  { box-shadow: 0 0 0 4px #0ff, 0 0 15px 4px #0ff; }
      75%  { box-shadow: 0 0 0 4px #0f0, 0 0 15px 4px #0f0; }
      100% { box-shadow: 0 0 0 4px #ff0, 0 0 15px 4px #ff0; }
    }

    .mk2-highlight {
      animation: mk2-flash-border 0.15s linear infinite;
      border-radius: 5px;
      z-index: 100;
      position: relative;
    }

    .mk2-selected {
      animation: mk2-selected-pulse 0.4s ease-in-out 3;
      border-radius: 5px;
      z-index: 100;
      position: relative;
    }

    @keyframes mk2-selected-pulse {
      0%   { box-shadow: 0 0 0 4px #fff, 0 0 20px 8px #ff0; }
      50%  { box-shadow: 0 0 0 6px #ff0, 0 0 30px 12px #f80; }
      100% { box-shadow: 0 0 0 4px #fff, 0 0 20px 8px #ff0; }
    }

    .mk2-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 99;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .mk2-overlay.active {
      opacity: 1;
    }

    .random-select-btn {
      background: linear-gradient(135deg, #cc0000, #ff6600);
      border: 2px solid #ffd700;
      color: #ffd700;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 10px 24px;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.9em;
      margin: 0 0 15px 0;
      transition: all 0.2s ease;
      box-shadow: 0 0 15px rgba(255, 100, 0, 0.4);
    }

    .random-select-btn:hover {
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      color: #000;
      box-shadow: 0 0 25px rgba(255, 200, 0, 0.6);
      transform: scale(1.05);
    }

    .random-select-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .game-wrapper {
      position: fixed;
      inset: 0;
      display: none;
      overflow: hidden;
      box-sizing: border-box;
    }

    body.game-active .game-wrapper {
      display: block;
    }

    #gameRoot {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    #gameRoot canvas {
      image-rendering: pixelated;
    }

    .game-ui {
      position: absolute;
      top: 0px;
      left: 0px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
      visibility: hidden;
    }

    .game-ui.visible {
      visibility: visible;
    }

    .back-button {
      background: rgba(17, 17, 17, 0.85);
      border: 2px solid #ffd700;
      color: #ffd700;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 20px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .back-button:hover {
      background: #ffd700;
      color: #000;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }

    .game-status {
      color: #ffd700;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
    }
  </style>

  <script type="module">
    import { startGame, destroyGame } from './src/main.js';

    class CharacterSelect {
      constructor({ onSelect, initialIndex = 0 } = {}) {
        this.onSelect = onSelect;
        this.tiles = Array.from(document.querySelectorAll('.character-tile'));
        this.currentIndex = this.normalizeIndex(initialIndex);
        this.cols = this.getCols();
        this.handleKeydown = this.handleKeydown.bind(this);

        this.init();
      }

      normalizeIndex(index) {
        const parsed = Number.parseInt(index, 10);
        if (Number.isNaN(parsed)) {
          return 0;
        }
        return Math.min(Math.max(parsed, 0), this.tiles.length - 1);
      }

      init() {
        this.updateSelection({ scroll: false });

        document.addEventListener('keydown', this.handleKeydown);

        window.addEventListener('resize', () => {
          this.cols = this.getCols();
        });

        this.tiles.forEach((tile, index) => {
          tile.addEventListener('click', (event) => {
            if (document.body.classList.contains('game-active')) {
              return;
            }

            event.preventDefault();
            this.currentIndex = index;
            this.updateSelection();

            if (tile.dataset.random === 'true') {
              this.triggerRandomSelect();
              return;
            }

            const sceneValue = tile.dataset.scene;
            if (typeof sceneValue === 'undefined') {
              return;
            }

            this.selectCurrent();
          });
        });
      }

      getCols() {
        if (window.matchMedia('(orientation: landscape) and (max-height: 600px)').matches) {
          return 7;
        }
        if (window.matchMedia('(max-width: 768px)').matches) {
          return 3;
        }
        return 4;
      }

      handleKeydown(event) {
        if (document.body.classList.contains('game-active')) {
          return;
        }

        switch (event.key) {
          case 'ArrowUp':
            event.preventDefault();
            this.moveUp();
            break;
          case 'ArrowDown':
            event.preventDefault();
            this.moveDown();
            break;
          case 'ArrowLeft':
            event.preventDefault();
            this.moveLeft();
            break;
          case 'ArrowRight':
            event.preventDefault();
            this.moveRight();
            break;
          case 'Enter':
          case ' ':
            event.preventDefault();
            this.selectCurrent();
            break;
          default:
            break;
        }
      }

      moveUp() {
        const currentRow = Math.floor(this.currentIndex / this.cols);
        if (currentRow > 0) {
          this.currentIndex -= this.cols;
          this.updateSelection();
        }
      }

      moveDown() {
        const newIndex = this.currentIndex + this.cols;
        if (newIndex < this.tiles.length) {
          this.currentIndex = newIndex;
          this.updateSelection();
        }
      }

      moveLeft() {
        const currentCol = this.currentIndex % this.cols;
        if (currentCol > 0) {
          this.currentIndex -= 1;
          this.updateSelection();
        }
      }

      moveRight() {
        const currentCol = this.currentIndex % this.cols;
        if (currentCol < this.cols - 1 && this.currentIndex + 1 < this.tiles.length) {
          this.currentIndex += 1;
          this.updateSelection();
        }
      }

      updateSelection({ scroll = true } = {}) {
        this.tiles.forEach((tile) => tile.classList.remove('selected'));

        const currentTile = this.tiles[this.currentIndex];
        if (!currentTile) {
          return;
        }

        currentTile.classList.add('selected');
        if (scroll) {
          currentTile.scrollIntoView({
            behavior: 'smooth',
            block: 'center',
            inline: 'center',
          });
        }
      }

      selectCurrent() {
        const currentTile = this.tiles[this.currentIndex];
        if (!currentTile) {
          return;
        }

        if (currentTile.dataset.random === 'true') {
          this.triggerRandomSelect();
          return;
        }

        const sceneValue = currentTile.dataset.scene;
        if (typeof sceneValue === 'undefined') {
          return;
        }

        const sceneIndex = Number.parseInt(sceneValue, 10);
        if (Number.isNaN(sceneIndex)) {
          return;
        }

        if (this.onSelect) {
          this.onSelect(sceneIndex);
        }
      }

      triggerRandomSelect() {
        const sceneTiles = this.tiles.filter(t => typeof t.dataset.scene !== 'undefined');
        mk2RandomSelect(sceneTiles, (chosenIndex) => {
          const sceneIndex = Number.parseInt(sceneTiles[chosenIndex].dataset.scene, 10);
          if (this.onSelect) {
            this.onSelect(sceneIndex);
          }
        });
      }

      focus(index) {
        this.currentIndex = this.normalizeIndex(index);
        this.updateSelection({ scroll: false });
      }

      focusCurrent() {
        this.updateSelection({ scroll: false });
      }

      isValidSceneIndex(sceneIndex) {
        const parsed = Number.parseInt(sceneIndex, 10);
        return !Number.isNaN(parsed)
          && parsed >= 0
          && parsed < this.tiles.length
          && typeof this.tiles[parsed]?.dataset.scene !== 'undefined';
      }
    }

    // MK2-style random select: rapidly cycles through all character tiles with
    // a flashing colored border, decelerates, then locks on the chosen fighter.
    function mk2RandomSelect(tiles, callback) {
      const overlay = document.createElement('div');
      overlay.className = 'mk2-overlay';
      document.body.appendChild(overlay);
      setTimeout(() => overlay.classList.add('active'), 10);

      const totalCycles = 24 + Math.floor(Math.random() * 8); // 24-31 steps
      const chosenIndex = Math.floor(Math.random() * tiles.length);

      let currentStep = 0;
      let currentIndex = Math.floor(Math.random() * tiles.length);
      let prevIndex = -1;

      function step() {
        if (prevIndex >= 0) {
          tiles[prevIndex].classList.remove('mk2-highlight');
        }

        currentIndex = (currentIndex + 1) % tiles.length;
        // On the last step, force land on chosen fighter
        if (currentStep === totalCycles - 1) {
          currentIndex = chosenIndex;
        }

        tiles[currentIndex].classList.add('mk2-highlight');
        tiles[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });

        prevIndex = currentIndex;
        currentStep++;

        if (currentStep < totalCycles) {
          // MK2 deceleration curve: starts ~60ms, slows to ~350ms
          const progress = currentStep / totalCycles;
          const delay = 60 + Math.pow(progress, 2.5) * 300;
          setTimeout(step, delay);
        } else {
          // Selection locked — pulse the winner MK2 style
          tiles[currentIndex].classList.remove('mk2-highlight');
          tiles[currentIndex].classList.add('mk2-selected');

          setTimeout(() => {
            tiles[currentIndex].classList.remove('mk2-selected');
            overlay.classList.remove('active');
            setTimeout(() => {
              overlay.remove();
              callback(chosenIndex);
            }, 300);
          }, 1400);
        }
      }

      step();
    }

    const backButton = document.getElementById('backButton');
    const gameUi = document.querySelector('.game-ui');
    const statusLabel = document.getElementById('gameStatus');
    const params = new URLSearchParams(window.location.search);
    const debugEnabled = params.get('debug') === '1';
    const initialSceneParam = Number.parseInt(params.get('scene'), 10);

    const characterSelect = new CharacterSelect({
      onSelect: (sceneIndex) => launchScene(sceneIndex),
      initialIndex: !Number.isNaN(initialSceneParam) ? initialSceneParam : 0,
    });

    if (!Number.isNaN(initialSceneParam) && characterSelect.isValidSceneIndex(initialSceneParam)) {
      launchScene(initialSceneParam, { updateHistory: false });
    } else {
      updateUrl(null);
    }

    backButton.addEventListener('click', () => {
      exitToSelect();
    });


    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && document.body.classList.contains('game-active')) {
        event.preventDefault();
        exitToSelect();
      }
    });

    document.addEventListener('enemy-defeated', () => {
      gameUi.classList.add('visible');
    });

    function launchScene(sceneIndex, { updateHistory = true } = {}) {
      const idx = Number.parseInt(sceneIndex, 10);
      if (Number.isNaN(idx)) {
        return;
      }

      document.body.classList.add('game-active');
      statusLabel.textContent = 'Press ESC to return';
      characterSelect.focus(idx);

      startGame({ sceneIndex: idx, debug: debugEnabled, parent: 'gameRoot' });

      if (updateHistory) {
        updateUrl(idx);
      }
    }

    function exitToSelect() {
      destroyGame();
      document.body.classList.remove('game-active');
      statusLabel.textContent = 'Select a fighter to begin';
      gameUi.classList.remove('visible');
      updateUrl(null);
      characterSelect.focusCurrent();
    }

    function updateUrl(sceneIndex) {
      const url = new URL(window.location.href);
      if (sceneIndex === null || typeof sceneIndex === 'undefined') {
        url.searchParams.delete('scene');
      } else {
        url.searchParams.set('scene', sceneIndex);
      }

      if (debugEnabled) {
        url.searchParams.set('debug', '1');
      } else {
        url.searchParams.delete('debug');
      }

      window.history.replaceState(null, '', url);
    }
  </script>
</body>

</html>
